name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0-dev.2676+4e2cec265

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Check formatting
        run: zig fmt --check src/ tools/

      - name: Build library + server
        run: zig build

      - name: Test (Debug)
        run: zig build test --summary all

      - name: Test (ReleaseSafe)
        run: zig build test -Doptimize=ReleaseSafe --summary all

  freebsd:
    name: Test (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '14.2'
          run: |
            curl -fsSL https://ziglang.org/builds/zig-x86_64-freebsd-${{ env.ZIG_VERSION }}.tar.xz -o zig.tar.xz
            tar xf zig.tar.xz
            export PATH="$PWD/zig-x86_64-freebsd-${{ env.ZIG_VERSION }}:$PATH"
            zig fmt --check src/ tools/
            zig build test --summary all

  cross-compile:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-linux-musl, riscv64-linux-musl]

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cross-compile
        run: zig build -Dtarget=${{ matrix.target }}
